name: Sentry Release

on:
    push:
        tags:
            - "v*"

jobs:
    release:
        runs-on: ubuntu-22.04
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
            - name: Use Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: "package.json"
            - name: Cache node modules
              id: cache-npm
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
              env:
                  cache-name: cache-node-modules
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-build-${{ env.cache-name }}-
                      ${{ runner.os }}-build-
                      ${{ runner.os }}-
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run build
              env:
                  ENV_NAME: production
                  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
            - name: Get version from package.json
              id: version
              run: echo "version=$(node -e 'import("./package.json",{with:{type:"json"}}).then(m=>process.stdout.write(m.default.name+"@"+m.default.version))')" >> "$GITHUB_OUTPUT"
            - name: Create Sentry release
              uses: getsentry/action-release@dab6548b3c03c4717878099e43782cf5be654289 # v3.5.0
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
              with:
                  environment: production
                  sourcemaps: ./extension/dist
                  release: ${{ steps.version.outputs.version }}
